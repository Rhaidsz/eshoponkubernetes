apiVersion: apps/v1
kind: Deployment
metadata:
  name: identity-api
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: identity-api
  template:
    metadata:
      labels:
        app: identity-api
    spec:
      containers:
      - name: identity-api
        image: kamilburuk/eshop-identity-api:latest
        imagePullPolicy: Always

        env:
        - name: ConnectionStrings__identitydb
          value: Host=postgres;Port=5432;Database=identitydb;Username=eshop;Password=eshop123

        - name: WebAppClient
          value: https://dev.eshop.local #http://localhost:8081
        ports:
        - containerPort: 8080
