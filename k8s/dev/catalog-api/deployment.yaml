apiVersion: apps/v1
kind: Deployment
metadata:
  name: catalog-api
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: catalog-api
  template:
    metadata:
      labels:
        app: catalog-api
    spec:
      containers:
      - name: catalog-api
        image: kamilburuk/eshop-catalog-api:v1
        imagePullPolicy: Always

        env:
        - name: ConnectionStrings__catalogdb
          value: Host=postgres;Port=5432;Database=catalogdb;Username=eshop;Password=eshop123

        - name: ConnectionStrings__eventbus
          value: amqp://guest:guest@rabbitmq:5672

        ports:
        - containerPort: 8080
