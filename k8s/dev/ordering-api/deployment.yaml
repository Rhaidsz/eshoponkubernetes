apiVersion: apps/v1
kind: Deployment
metadata:
  name: ordering-api
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ordering-api
  template:
    metadata:
      labels:
        app: ordering-api
    spec:
      containers:
      - name: ordering-api
        image: kamilburuk/eshop-ordering-api:v1
        imagePullPolicy: Always

        env:
        - name: ConnectionStrings__orderingdb
          value: Host=postgres;Port=5432;Database=orderingdb;Username=eshop;Password=eshop123

        - name: ConnectionStrings__eventbus
          value: amqp://guest:guest@rabbitmq:5672

        ports:
        - containerPort: 8080
