apiVersion: apps/v1
kind: Deployment
metadata:
  name: webapp
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: webapp
  template:
    metadata:
      labels:
        app: webapp
    spec:
      containers:
      - name: webapp
        image: kamilburuk/eshop-webapp:latest
        imagePullPolicy: Always

        env:
        - name: ConnectionStrings__EventBus
          value: amqp://guest:guest@rabbitmq:5672

        - name: IdentityUrl
          value: http://identity-api #https://dev.identity.eshop.course-datascientest2026.cloud-ip.cc  #http://identity.eshop.local #https://identity.eshop.local

        - name: CallBackUrl
          value: https://dev.eshop.course-datascientest2026.cloud-ip.cc #http://eshop.local

        - name: ASPNETCORE_ENVIRONMENT # Neu hinzugefügt
          value: Development

        ports:
        - containerPort: 8080
