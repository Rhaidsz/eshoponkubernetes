apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: webapp
  namespace: dev
spec:
  ingressClassName: traefik

  tls:
  - hosts:
    - dev.eshop.course-datascientest2026.cloud-ip.cc
    secretName: eshop-tls

  rules:
  - host: dev.eshop.course-datascientest2026.cloud-ip.cc
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: webapp
            port:
              number: 80
