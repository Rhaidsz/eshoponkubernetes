apiVersion: apps/v1
kind: Deployment
metadata:
  name: basket-api
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: basket-api
  template:
    metadata:
      labels:
        app: basket-api
    spec:
      containers:
      - name: basket-api
        image: kamilburuk/eshop-basket-api:v1
        imagePullPolicy: Always

        env:
        - name: ConnectionStrings__redis
          value: redis:6379

        - name: ConnectionStrings__eventbus
          value: amqp://guest:guest@rabbitmq:5672

        ports:
        - containerPort: 8080
