apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-processor
  namespace: dev
spec:
  replicas: 1
  selector:
    matchLabels:
      app: payment-processor
  template:
    metadata:
      labels:
        app: payment-processor
    spec:
      containers:
      - name: payment-processor
        image: kamilburuk/eshop-payment-processor:latest
        imagePullPolicy: Always

        env:
        - name: ConnectionStrings__EventBus
          value: amqp://guest:guest@rabbitmq:5672

        ports:
        - containerPort: 8080
